name: Docs
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  setup:
    name: Set up Docs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install sphinx nbsphinx myst-parser
        python -m pip install .
    - name: Generate API Docs
      run: |
        sphinx-apidoc -f -e -o docs/api project_test
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: api-for-${{ github.sha }}   # unique ID
        path: docs/api

  build:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - name: Setup
      uses: actions/checkout@v6
    steps:
    - uses: actions/checkout@main
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install sphinx nbsphinx myst-parser
        python -m pip install .
    - name: Download artifacts
      uses: actions/download-artifacts@v6
      with:
        name: api-for-${{ github.sha }}
        path: docs/api
